<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f5f7">
<title>Lyric Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f5f7;
  --bg2:#ffffff;
  --bg3:#ebebed;
  --bg4:#e0e0e3;
  --border:#d0d0d5;
  --text:#1a1a1e;
  --text2:#5a5a6a;
  --text3:#9090a0;
  --accent:#7c3aed;
  --accent2:#6d28d9;
  --green:#16a34a;
  --red:#dc2626;
  --amber:#d97706;
  --a-col:#2563eb;
  --b-col:#db2777;
  --radius:10px;
  --header:52px;
  --nav:50px;
  --font-mono:'Roboto Mono',monospace;
  --font-sans:'Roboto',sans-serif;
}
html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:16px;-webkit-font-smoothing:antialiased}
button,input,textarea,select{font-family:inherit;font-size:16px;color:inherit;background:none;border:none;outline:none}
button{cursor:pointer;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
#header{height:var(--header);min-height:var(--header);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:100;flex-shrink:0}
#logo{font-family:var(--font-mono);font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.5px}
#logo span{color:var(--accent)}
#ver{font-size:11px;color:var(--text3);font-family:var(--font-mono);background:var(--bg3);padding:2px 6px;border-radius:4px;border:1px solid var(--border)}
#sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);margin-left:auto;transition:background 0.3s}
#sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
#sync-dot.ok{background:var(--green)}
#sync-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

#nav{height:var(--nav);min-height:var(--nav);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;overflow-y:hidden;flex-shrink:0;scrollbar-width:none}
#nav::-webkit-scrollbar{display:none}
.nav-tab{flex:1;min-width:64px;height:var(--nav);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--text3);font-size:10px;font-weight:500;letter-spacing:0.3px;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.2s;padding:0 8px}
.nav-tab .tab-icon{font-size:18px;line-height:1}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

#content{flex:1;overflow:hidden;position:relative}
.tab-page{display:none;flex-direction:column;height:100%;overflow:hidden}
.tab-page.active{display:flex}

/* EDITOR */
#editor-page{flex-direction:column}
.panel{display:flex;flex-direction:column;position:relative;overflow:hidden}
.panel-a{flex:1;border-bottom:3px solid var(--accent2)}
.panel-b{flex:1}
.panel-header{height:36px;min-height:36px;background:var(--bg3);display:flex;align-items:center;padding:0 12px;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-label{font-family:var(--font-mono);font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px}
.label-a{background:rgba(59,130,246,0.15);color:var(--a-col)}
.label-b{background:rgba(236,72,153,0.15);color:var(--b-col)}
.panel-title{flex:1;font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.panel-btn{width:44px;height:36px;color:var(--text3);font-size:14px;flex-shrink:0}
.panel-btn:hover{color:var(--text)}
.panel-body{flex:1;display:flex;overflow:hidden;position:relative}
/* Row height = font-size * line-height, no extra vertical padding.
   All three columns (line-num, mark, textarea) share the same --row-h. */
:root { --row-h: calc(16px * 1.6); }  /* 25.6px per row */

.line-col{width:32px;min-width:32px;overflow:hidden;position:relative;flex-shrink:0;background:var(--bg3);border-right:1px solid var(--border)}
.line-col-inner{position:absolute;top:0;left:0;right:0;will-change:transform}
.line-num{height:var(--row-h);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--text3)}
.mark-col{width:36px;min-width:36px;overflow:hidden;position:relative;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg2)}
.mark-col-inner{position:absolute;top:0;left:0;right:0;will-change:transform}
.mark-btn{height:var(--row-h);width:36px;display:flex;align-items:center;justify-content:center;font-size:14px;font-family:var(--font-mono);color:var(--text3);cursor:pointer;user-select:none;-webkit-user-select:none}
.mark-btn[data-state="1"]{color:var(--green)}
.mark-btn[data-state="2"]{color:var(--red)}
.textarea-wrap{flex:1;overflow:hidden;position:relative}
.lyric-ta{
  width:100%;height:100%;
  padding:0 10px;
  background:var(--bg2);
  color:var(--text);
  font-family:var(--font-mono);
  font-size:16px;
  line-height:1.6;
  resize:none;
  overflow-y:auto;
  overflow-x:auto;
  white-space:pre;
  -webkit-overflow-scrolling:touch;
  border:none;
  outline:none;
  display:block;
}
.lyric-ta::placeholder{color:var(--text3)}
.panel-footer{height:28px;min-height:28px;background:var(--bg3);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:10px;flex-shrink:0}
.footer-stat{font-size:11px;color:var(--text3);font-family:var(--font-mono)}

/* SESSIONS */
#sessions-page{overflow-y:auto;padding:16px;gap:12px}
.session-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.session-header h2{font-size:14px;font-weight:600;color:var(--text)}
.btn-primary{height:44px;padding:0 16px;background:var(--accent2);color:var(--text);border-radius:var(--radius);font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
.btn-primary:active{background:var(--accent)}
.session-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;display:flex;flex-direction:column;gap:6px;cursor:pointer;transition:border-color 0.2s}
.session-card:active{border-color:var(--accent)}
.session-card-top{display:flex;align-items:center;gap:8px}
.session-name{font-weight:600;font-size:14px;flex:1}
.session-del{color:var(--text3);font-size:16px;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center}
.session-songs{font-size:12px;color:var(--text2);display:flex;gap:8px;flex-wrap:wrap}
.song-tag{padding:2px 8px;border-radius:4px;font-family:var(--font-mono);font-size:11px}
.song-tag-a{background:rgba(59,130,246,0.15);color:var(--a-col)}
.song-tag-b{background:rgba(236,72,153,0.15);color:var(--b-col)}
.session-meta{font-size:11px;color:var(--text3);display:flex;gap:10px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:8px;color:var(--text3);padding:40px 20px;text-align:center}
.empty-icon{font-size:40px;opacity:0.4}
.empty-text{font-size:14px}

/* COMPOSE */
#compose-page{overflow-y:auto;padding:16px;gap:12px}
.compose-header{display:flex;align-items:center;justify-content:space-between}
.compose-header h2{font-size:14px;font-weight:600}
.compose-actions{display:flex;gap:8px}
.btn-sm{height:36px;padding:0 12px;border-radius:8px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.btn-outline{border:1px solid var(--border);color:var(--text2)}
.btn-outline:active{background:var(--bg3)}
.compose-lines{display:flex;flex-direction:column;gap:2px}
.compose-line{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.compose-tag{font-family:var(--font-mono);font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;min-width:24px;text-align:center;flex-shrink:0;margin-top:2px}
.compose-tag-a{background:rgba(59,130,246,0.2);color:var(--a-col)}
.compose-tag-b{background:rgba(236,72,153,0.2);color:var(--b-col)}
.compose-text{font-family:var(--font-mono);font-size:14px;line-height:1.6;color:var(--text);flex:1;word-break:break-word}

/* LIBRARY */
#library-page{display:flex;flex-direction:column;overflow:hidden}
.lib-search-bar{padding:10px 12px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.search-input-wrap{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:0 12px;gap:8px}
.search-input-wrap input{flex:1;height:40px;font-size:14px;background:none;color:var(--text)}
.search-input-wrap input::placeholder{color:var(--text3)}
.search-icon{color:var(--text3);font-size:16px}
#lib-list{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.lib-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;display:flex;flex-direction:column;gap:6px}
.lib-card-top{display:flex;align-items:center;gap:8px}
.lib-title{font-weight:600;font-size:14px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lib-del{color:var(--text3);font-size:16px;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center}
.lib-meta{font-size:11px;color:var(--text3);font-family:var(--font-mono)}
.lib-actions{display:flex;gap:6px;margin-top:2px}
.btn-load{height:32px;padding:0 12px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid}
.btn-load-a{border-color:var(--a-col);color:var(--a-col)}
.btn-load-a:active{background:rgba(59,130,246,0.15)}
.btn-load-b{border-color:var(--b-col);color:var(--b-col)}
.btn-load-b:active{background:rgba(236,72,153,0.15)}

/* COMPARE */
#compare-page{display:flex;flex-direction:column;overflow:hidden}
.compare-selects{padding:10px 12px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.compare-sel-wrap{flex:1;display:flex;flex-direction:column;gap:3px}
.compare-sel-label{font-size:10px;font-weight:700;font-family:var(--font-mono)}
.sel-a-label{color:var(--a-col)}
.sel-b-label{color:var(--b-col)}
.compare-sel-wrap select{height:40px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:13px;color:var(--text);-webkit-appearance:none}
.compare-body{flex:1;display:flex;overflow:hidden}
.compare-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.compare-panel:last-child{border-right:none}
.compare-panel-header{height:32px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0}
.compare-panel-title{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.compare-scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.compare-lines{padding:4px 0}
.compare-line{display:flex;min-height:calc(1em * 1.6 + 8px);align-items:flex-start}
.compare-lnum{width:28px;min-width:28px;padding:4px 0;font-family:var(--font-mono);font-size:10px;color:var(--text3);text-align:center;flex-shrink:0}
.compare-ltext{flex:1;padding:4px 6px 4px 2px;font-family:var(--font-mono);font-size:13px;line-height:1.6;color:var(--text);word-break:break-word}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:flex-end;justify-content:center}
.modal-overlay.visible{display:flex}
.modal-sheet{background:var(--bg2);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:20px;border-top:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-input{width:100%;height:48px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:0 14px;font-size:16px;color:var(--text);margin-bottom:16px}
.modal-input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:10px}
.modal-btn-cancel{flex:1;height:48px;border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:15px;font-weight:500}
.modal-btn-ok{flex:1;height:48px;background:var(--accent2);border-radius:var(--radius);color:white;font-size:15px;font-weight:600}

/* CONFIRM MODAL */
.confirm-sheet{background:var(--bg2);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:20px;border-top:1px solid var(--border)}
.confirm-title{font-size:16px;font-weight:600;margin-bottom:8px}
.confirm-msg{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:10px}
.confirm-cancel{flex:1;height:48px;border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:15px;font-weight:500}
.confirm-ok{flex:1;height:48px;background:var(--red);border-radius:var(--radius);color:white;font-size:15px;font-weight:600}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:10px 18px;font-size:13px;color:var(--text);opacity:0;transition:all 0.25s;z-index:2000;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Title input in panel header */
.panel-title-input{flex:1;background:none;border:none;font-size:13px;color:var(--text2);min-width:0;height:32px;padding:0 4px}
.panel-title-input::placeholder{color:var(--text3)}
.panel-title-input:focus{color:var(--text)}
</style>
</head>
<body>
<div id="app">
  <header id="header">
    <div id="logo">Lyric<span>Studio</span></div>
    <div id="ver">v1.2</div>
    <div id="sync-dot" title="Sync status"></div>
  </header>

  <nav id="nav">
    <button class="nav-tab active" data-tab="editor">
      <span class="tab-icon">✏️</span>Editor
    </button>
    <button class="nav-tab" data-tab="sessions">
      <span class="tab-icon">💾</span>Sessioni
    </button>
    <button class="nav-tab" data-tab="compose">
      <span class="tab-icon">🎵</span>Componi
    </button>
    <button class="nav-tab" data-tab="library">
      <span class="tab-icon">📚</span>Libreria
    </button>
    <button class="nav-tab" data-tab="compare">
      <span class="tab-icon">⚖️</span>Confronto
    </button>
  </nav>

  <div id="content">

    <!-- EDITOR TAB -->
    <div class="tab-page active" id="editor-page">
      <div class="panel panel-a">
        <div class="panel-header">
          <span class="panel-label label-a">A</span>
          <input class="panel-title-input" id="title-a" placeholder="Titolo canzone A…" autocomplete="off" spellcheck="false">
          <button class="panel-btn" id="save-a-btn" title="Salva">💾</button>
        </div>
        <div class="panel-body">
          <div class="line-col" id="lnum-a-col">
            <div class="line-col-inner" id="lnum-a"></div>
          </div>
          <div class="mark-col" id="mark-a-col">
            <div class="mark-col-inner" id="mark-a"></div>
          </div>
          <div class="textarea-wrap">
            <textarea class="lyric-ta" id="ta-a" placeholder="Incolla qui il testo originale…" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
          </div>
        </div>
        <div class="panel-footer">
          <span class="footer-stat" id="stat-a">0 righe · 0 parole</span>
          <span class="footer-stat" id="marks-stat-a" style="color:var(--green)">✓ 0</span>
        </div>
      </div>

      <div class="panel panel-b">
        <div class="panel-header">
          <span class="panel-label label-b">B</span>
          <input class="panel-title-input" id="title-b" placeholder="Titolo canzone B…" autocomplete="off" spellcheck="false">
          <button class="panel-btn" id="save-b-btn" title="Salva">💾</button>
        </div>
        <div class="panel-body">
          <div class="line-col" id="lnum-b-col">
            <div class="line-col-inner" id="lnum-b"></div>
          </div>
          <div class="mark-col" id="mark-b-col">
            <div class="mark-col-inner" id="mark-b"></div>
          </div>
          <div class="textarea-wrap">
            <textarea class="lyric-ta" id="ta-b" placeholder="Incolla qui la traduzione…" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
          </div>
        </div>
        <div class="panel-footer">
          <span class="footer-stat" id="stat-b">0 righe · 0 parole</span>
          <span class="footer-stat" id="marks-stat-b" style="color:var(--green)">✓ 0</span>
        </div>
      </div>
    </div>

    <!-- SESSIONS TAB -->
    <div class="tab-page" id="sessions-page">
      <div class="session-header">
        <h2>Sessioni salvate</h2>
        <button class="btn-primary" id="save-session-btn">＋ Salva sessione</button>
      </div>
      <div id="sessions-list"></div>
    </div>

    <!-- COMPOSE TAB -->
    <div class="tab-page" id="compose-page">
      <div class="compose-header">
        <h2>Composizione finale</h2>
        <div class="compose-actions">
          <button class="btn-sm btn-outline" id="copy-btn">📋 Copia</button>
          <button class="btn-sm btn-outline" id="download-btn">⬇️ .txt</button>
        </div>
      </div>
      <div class="compose-lines" id="compose-lines"></div>
      <div class="empty-state" id="compose-empty" style="display:none">
        <div class="empty-icon">🎵</div>
        <div class="empty-text">Segna delle righe con ✓ nell'editor per comporle qui</div>
      </div>
    </div>

    <!-- LIBRARY TAB -->
    <div class="tab-page" id="library-page">
      <div class="lib-search-bar">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="search" id="lib-search" placeholder="Cerca canzoni…" autocomplete="off">
        </div>
      </div>
      <div id="lib-list"></div>
    </div>

    <!-- COMPARE TAB -->
    <div class="tab-page" id="compare-page">
      <div class="compare-selects">
        <div class="compare-sel-wrap">
          <span class="compare-sel-label sel-a-label">CANZONE A</span>
          <select id="cmp-sel-a"><option value="">— scegli —</option></select>
        </div>
        <div class="compare-sel-wrap">
          <span class="compare-sel-label sel-b-label">CANZONE B</span>
          <select id="cmp-sel-b"><option value="">— scegli —</option></select>
        </div>
      </div>
      <div class="compare-body">
        <div class="compare-panel">
          <div class="compare-panel-header">
            <span class="panel-label label-a">A</span>
            <span class="compare-panel-title" id="cmp-title-a">—</span>
          </div>
          <div class="compare-scroll-area" id="cmp-scroll-a">
            <div class="compare-lines" id="cmp-lines-a"></div>
          </div>
        </div>
        <div class="compare-panel">
          <div class="compare-panel-header">
            <span class="panel-label label-b">B</span>
            <span class="compare-panel-title" id="cmp-title-b">—</span>
          </div>
          <div class="compare-scroll-area" id="cmp-scroll-b">
            <div class="compare-lines" id="cmp-lines-b"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: name input -->
<div class="modal-overlay" id="modal-name">
  <div class="modal-sheet">
    <div class="modal-title" id="modal-title-text">Nome sessione</div>
    <input class="modal-input" id="modal-input" placeholder="Es. Canzone #1" autocomplete="off">
    <div class="modal-btns">
      <button class="modal-btn-cancel" id="modal-cancel">Annulla</button>
      <button class="modal-btn-ok" id="modal-ok">OK</button>
    </div>
  </div>
</div>

<!-- MODAL: confirm -->
<div class="modal-overlay" id="modal-confirm">
  <div class="confirm-sheet">
    <div class="confirm-title" id="confirm-title">Conferma</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-btns">
      <button class="confirm-cancel" id="confirm-cancel">Annulla</button>
      <button class="confirm-ok" id="confirm-ok">Elimina</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function uid() { return 'ls_' + Math.random().toString(36).slice(2) + Date.now().toString(36); }
function now() { return Date.now(); }
function toast(msg, dur = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), dur);
}
function setSyncDot(status) {
  const d = document.getElementById('sync-dot');
  d.className = '';
  if (status === 'syncing') d.classList.add('syncing');
  else if (status === 'ok') d.classList.add('ok');
  else if (status === 'err') d.classList.add('err');
  state.syncStatus = status;
}

// ─── MODAL PROMISE ────────────────────────────────────────────────────────────
function showModal(title = 'Nome', placeholder = '', defaultVal = '') {
  return new Promise(resolve => {
    const overlay = document.getElementById('modal-name');
    const inp = document.getElementById('modal-input');
    const okBtn = document.getElementById('modal-ok');
    const cancelBtn = document.getElementById('modal-cancel');
    document.getElementById('modal-title-text').textContent = title;
    inp.placeholder = placeholder;
    inp.value = defaultVal;
    overlay.classList.add('visible');
    setTimeout(() => inp.focus(), 100);
    function cleanup(val) {
      overlay.classList.remove('visible');
      okBtn.removeEventListener('click', onOk);
      cancelBtn.removeEventListener('click', onCancel);
      inp.removeEventListener('keydown', onKey);
      resolve(val);
    }
    function onOk() { cleanup(inp.value.trim() || null); }
    function onCancel() { cleanup(null); }
    function onKey(e) { if (e.key === 'Enter') onOk(); if (e.key === 'Escape') onCancel(); }
    okBtn.addEventListener('click', onOk);
    cancelBtn.addEventListener('click', onCancel);
    inp.addEventListener('keydown', onKey);
  });
}

function showConfirm(title, msg) {
  return new Promise(resolve => {
    const overlay = document.getElementById('modal-confirm');
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-msg').textContent = msg;
    overlay.classList.add('visible');
    const okBtn = document.getElementById('confirm-ok');
    const cancelBtn = document.getElementById('confirm-cancel');
    function cleanup(v) {
      overlay.classList.remove('visible');
      okBtn.removeEventListener('click', onOk);
      cancelBtn.removeEventListener('click', onCancel);
      resolve(v);
    }
    function onOk() { cleanup(true); }
    function onCancel() { cleanup(false); }
    okBtn.addEventListener('click', onOk);
    cancelBtn.addEventListener('click', onCancel);
  });
}

const LS = {

  saveSongs(songs) { localStorage.setItem('ls_songs', JSON.stringify(songs)); },
  getSessions() { try { return JSON.parse(localStorage.getItem('ls_sessions') || '[]'); } catch { return []; } },

};

// ─── SUPABASE SYNC ────────────────────────────────────────────────────────────
async function sbPullSongs() {
  try {
    const { data, error } = await sb.from('songs').select('*');
    if (error) throw error;
    return data || [];
  } catch (e) { return []; }
}
async function sbPullSessions() {
  try {
    const { data, error } = await sb.from('sessions').select('*');
    if (error) throw error;
    return data || [];
  } catch (e) { return []; }
}
async function sbUpsertSong(song) {
  const { error } = await sb.from('songs').upsert({ id: song.id, title: song.title, text: song.text, marks: song.marks, ts: song.ts });
  if (error) throw error;
}
async function sbUpsertSession(session) {
  const { error } = await sb.from('sessions').upsert({ id: session.id, name: session.name, song_a: session.song_a, song_b: session.song_b, marks_a: session.marks_a, marks_b: session.marks_b, ts: session.ts });
  if (error) throw error;
}
async function sbDeleteSong(id) {
  await sb.from('songs').delete().eq('id', id);
}
async function sbDeleteSession(id) {
  await sb.from('sessions').delete().eq('id', id);
}

function mergeSongs(local, remote) {
  const map = {};
  for (const s of local) map[s.id] = s;
  for (const s of remote) {
    if (!map[s.id] || s.ts > map[s.id].ts) map[s.id] = s;
  }
  return Object.values(map);
}

async function initialSync() {
  setSyncDot('syncing');
  try {
    const [remSongs, remSessions] = await Promise.all([sbPullSongs(), sbPullSessions()]);
    const locSongs = LS.getSongs();
    const locSessions = LS.getSessions();
    const mergedSongs = mergeSongs(locSongs, remSongs);
    const mergedSessions = mergeSongs(locSessions, remSessions);
    LS.saveSongs(mergedSongs);
    LS.saveSessions(mergedSessions);
    state.songs = mergedSongs;
    state.sessions = mergedSessions;
    setSyncDot('ok');
  } catch (e) {
    state.songs = LS.getSongs();
    state.sessions = LS.getSessions();
    setSyncDot('err');
  }
  renderLibrary();
  renderSessions();
  renderCompareSelects();
}

// ─── SONG SAVE ────────────────────────────────────────────────────────────────
let debounceA, debounceB;
async function saveSong(which) {
  const song = which === 'a' ? state.songA : state.songB;
  if (!song.title && !song.text) return;
  if (!song.id) song.id = uid();
  song.ts = now();
  const existing = state.songs.find(s => s.id === song.id);
  if (existing) Object.assign(existing, { title: song.title, text: song.text, marks: song.marks, ts: song.ts });
  else state.songs.push({ ...song });
  LS.saveSongs(state.songs);
  renderLibrary();
  renderCompareSelects();
  setSyncDot('syncing');
  try {
    await sbUpsertSong(song);
    setSyncDot('ok');
  } catch { setSyncDot('err'); }
}

function scheduleSave(which) {
  if (which === 'a') { clearTimeout(debounceA); debounceA = setTimeout(() => saveSong('a'), 900); }
  else { clearTimeout(debounceB); debounceB = setTimeout(() => saveSong('b'), 900); }
}

function buildLineNums(which, count) {
  const container = document.getElementById(`lnum-${which}`);
  container.innerHTML = '';
  for (let i = 1; i <= count; i++) {
    const d = document.createElement('div');
    d.className = 'line-num';
    d.textContent = i;
    container.appendChild(d);
  }
}

function buildMarkCol(which, count) {
  const container = document.getElementById(`mark-${which}`);
  container.innerHTML = '';
  const song = which === 'a' ? state.songA : state.songB;
  for (let i = 0; i < count; i++) {
    const s = song.marks[i] || 0;
    const d = document.createElement('div');
    d.className = 'mark-btn';
    d.dataset.state = s;
    d.dataset.idx = i;
    d.dataset.which = which;
    d.textContent = s === 0 ? '·' : s === 1 ? '✓' : '✕';
    container.appendChild(d);
  }
}

function updateStats(which) {
  const ta = document.getElementById(`ta-${which}`);
  const val = ta.value;
  const lines = val === '' ? 0 : val.split('\n').length;
  const words = val.trim() === '' ? 0 : val.trim().split(/\s+/).length;
  document.getElementById(`stat-${which}`).textContent = `${lines} righe · ${words} parole`;
  const song = which === 'a' ? state.songA : state.songB;
  const marked = Object.values(song.marks).filter(v => v === 1).length;
  document.getElementById(`marks-stat-${which}`).textContent = `✓ ${marked}`;
}

function refreshPanel(which) {
  const ta = document.getElementById(`ta-${which}`);
  const lines = ta.value === '' ? 0 : ta.value.split('\n').length;
  buildLineNums(which, lines);
  buildMarkCol(which, lines);
  updateStats(which);
}

function syncMarkScroll(ta, which) {
  const inner = document.getElementById(`lnum-${which}`);
  const markInner = document.getElementById(`mark-${which}`);
  const scrollTop = ta.scrollTop;
  inner.style.transform = `translateY(-${scrollTop}px)`;
  markInner.style.transform = `translateY(-${scrollTop}px)`;
}

// ─── SYNC SCROLL A<->B ────────────────────────────────────────────────────────
let lockA = false, lockB = false;
function setupSyncScroll() {
  const tA = document.getElementById('ta-a');
  const tB = document.getElementById('ta-b');
  tA.addEventListener('scroll', () => {
    syncMarkScroll(tA, 'a');
    if (lockA) return;
    const maxA = tA.scrollHeight - tA.clientHeight;
    const ratio = maxA > 0 ? tA.scrollTop / maxA : 0;
    lockB = true;
    const maxB = tB.scrollHeight - tB.clientHeight;
    tB.scrollTop = ratio * maxB;
    syncMarkScroll(tB, 'b');
    setTimeout(() => { lockB = false; }, 50);
  });
  tB.addEventListener('scroll', () => {
    syncMarkScroll(tB, 'b');
    if (lockB) return;
    const maxB = tB.scrollHeight - tB.clientHeight;
    const ratio = maxB > 0 ? tB.scrollTop / maxB : 0;
    lockA = true;
    const maxA = tA.scrollHeight - tA.clientHeight;
    tA.scrollTop = ratio * maxA;
    syncMarkScroll(tA, 'a');
    setTimeout(() => { lockA = false; }, 50);
  });
}

// ─── COMPOSE ─────────────────────────────────────────────────────────────────
function renderCompose() {
  const container = document.getElementById('compose-lines');
  const empty = document.getElementById('compose-empty');
  const linesA = state.songA.text.split('\n');
  const linesB = state.songB.text.split('\n');
  const items = [];

  Object.entries(state.songA.marks).forEach(([i, v]) => {
    if (v === 1) items.push({ idx: parseInt(i), which: 'a', text: linesA[i] || '' });
  });
  Object.entries(state.songB.marks).forEach(([i, v]) => {
    if (v === 1) items.push({ idx: parseInt(i), which: 'b', text: linesB[i] || '' });
  });

  // sort by index
  items.sort((a, b) => a.idx - b.idx || (a.which < b.which ? -1 : 1));

  if (items.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';
  container.innerHTML = items.map(it => `
    <div class="compose-line">
      <span class="compose-tag compose-tag-${it.which}">${it.which.toUpperCase()}</span>
      <span class="compose-text">${escHtml(it.text)}</span>
    </div>`).join('');
}

function getComposeText() {
  const linesA = state.songA.text.split('\n');
  const linesB = state.songB.text.split('\n');
  const items = [];
  Object.entries(state.songA.marks).forEach(([i, v]) => {
    if (v === 1) items.push({ idx: parseInt(i), which: 'a', text: linesA[i] || '' });
  });
  Object.entries(state.songB.marks).forEach(([i, v]) => {
    if (v === 1) items.push({ idx: parseInt(i), which: 'b', text: linesB[i] || '' });
  });
  items.sort((a, b) => a.idx - b.idx || (a.which < b.which ? -1 : 1));
  return items.map(it => `[${it.which.toUpperCase()}] ${it.text}`).join('\n');
}

document.getElementById('copy-btn').addEventListener('click', async () => {
  const txt = getComposeText();
  if (!txt) { toast('Nessuna riga selezionata'); return; }
  try { await navigator.clipboard.writeText(txt); toast('Copiato ✓'); }
  catch { toast('Copia non disponibile'); }
});

document.getElementById('download-btn').addEventListener('click', () => {
  const txt = getComposeText();
  if (!txt) { toast('Nessuna riga selezionata'); return; }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt], { type: 'text/plain' }));

});

  });

// ─── NAV TABS ─────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-page').forEach(p => p.classList.toggle('active', p.id === `${name}-page`));
  if (name === 'compose') renderCompose();
  if (name === 'library') renderLibrary(document.getElementById('lib-search').value);
  if (name === 'sessions') renderSessions();
}

document.getElementById('nav').addEventListener('click', e => {
  const tab = e.target.closest('.nav-tab');
  if (tab) switchTab(tab.dataset.tab);
});

// ─── UTILS ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
