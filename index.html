<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyric Composer v1.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0d0d0f;
  --bg2: #13131a;
  --bg3: #1a1a24;
  --bg4: #21212e;
  --border: #2a2a3a;
  --border2: #35354a;
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --gold-dim: rgba(201,168,76,0.15);
  --gold-dim2: rgba(201,168,76,0.08);
  --text: #e8e4d8;
  --text2: #a09a8c;
  --text3: #5a5650;
  --green: #5db88a;
  --red: #c96060;
  --yellow: #c9a060;
  --blue: #607ac9;
  --radius: 8px;
  --panel: 420px;
}

[data-theme="light"] {
  --bg: #f5f4f0;
  --bg2: #eceae4;
  --bg3: #e2e0d8;
  --bg4: #d8d5cc;
  --border: #ccc9be;
  --border2: #b8b4a8;
  --gold: #9a7530;
  --gold2: #7a5a18;
  --gold-dim: rgba(154,117,48,0.12);
  --gold-dim2: rgba(154,117,48,0.06);
  --text: #1a1814;
  --text2: #5a5248;
  --text3: #9a9288;
  --green: #2d7a55;
  --red: #a03030;
  --yellow: #8a6030;
  --blue: #3050a0;
}

.theme-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  border-radius: var(--radius);
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text2);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.theme-toggle:hover { border-color: var(--gold); color: var(--gold); }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
}

/* ── SCROLLBARS ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* ── LAYOUT ── */
#app { display: flex; flex-direction: column; height: 100vh; }

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 20px;
  height: 52px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
  z-index: 10;
}

.logo {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--gold2);
  white-space: nowrap;
}
.logo span { color: var(--text2); font-weight: 400; }

header .spacer { flex: 1; }

.sync-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text3);
  flex-shrink: 0;
  transition: background 0.3s;
}
.sync-dot.syncing { background: var(--yellow); animation: blink 0.7s infinite alternate; }
.sync-dot.ok { background: var(--green); }
.sync-dot.err { background: var(--red); }
@keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }

.session-label {
  font-size: 11px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.session-label.active { color: var(--gold); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 13px;
  border-radius: var(--radius);
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--gold); color: var(--gold); }
.btn.primary { background: var(--gold-dim); border-color: var(--gold); color: var(--gold2); }
.btn.primary:hover { background: rgba(201,168,76,0.25); }
.btn.danger:hover { border-color: var(--red); color: var(--red); }
.btn.small { padding: 4px 9px; font-size: 11px; }
.btn.icon { padding: 5px 8px; }

/* ── TABS ── */
.tabs-bar {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
  overflow-x: auto;
}
.tab-btn {
  padding: 10px 18px;
  border: none;
  background: transparent;
  color: var(--text3);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text2); }
.tab-btn.active { color: var(--gold2); border-bottom-color: var(--gold); }

/* ── TAB CONTENT ── */
.tab-content { display: none; flex: 1; overflow: hidden; }
.tab-content.active { display: flex; flex-direction: column; }

/* ── EDITOR TAB ── */
#tab-editor {
  flex-direction: row;
  overflow: hidden;
}

.panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.panel:last-child { border-right: none; }

.panel-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}

.panel-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--gold-dim);
  color: var(--gold);
  flex-shrink: 0;
}
.panel-label.b { background: rgba(96,122,201,0.15); color: #8fa3e0; }

.title-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 600;
  outline: none;
  min-width: 0;
}
.title-input::placeholder { color: var(--text3); font-weight: 400; }

.panel-body {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

.line-numbers {
  width: 40px;
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  font-family: 'JetBrains Mono', 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text3);
  text-align: right;
  padding-right: 6px;
  user-select: none;
  line-height: 1.7;
  overflow: hidden;
  position: relative;
}

.line-numbers-inner {
  position: absolute;
  top: 12px;
  right: 6px;
  left: 0;
  white-space: pre;
}

.marks-col {
  width: 28px;
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.marks-col-inner {
  position: absolute;
  top: 12px;
  left: 0;
  right: 0;
  display: flex;
  flex-direction: column;
}

.mark-btn {
  width: 28px;
  height: calc(13px * 1.7);
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 11px;
  color: var(--text3);
  transition: all 0.1s;
  flex-shrink: 0;
  padding: 0;
}
.mark-btn:hover { color: var(--text); }
.mark-btn.include { color: var(--green); }
.mark-btn.exclude { color: var(--red); }

.textarea-wrap {
  flex: 1;
  position: relative;
  min-width: 0;
  overflow: hidden;
}

.editor-textarea {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'JetBrains Mono', 'DM Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
  outline: none;
  resize: none;
  padding: 12px;
  white-space: pre;
  overflow-wrap: normal;
  letter-spacing: 0.01em;
  overflow: auto;
}

.panel-footer {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 7px 14px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
}
.panel-footer .stat { color: var(--text2); }
.panel-footer .spacer { flex: 1; }

/* ── LIST VIEWS ── */
.list-view {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.list-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}

.search-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  padding: 6px 12px;
  outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--gold); }
.search-input::placeholder { color: var(--text3); }

/* ── CARDS ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.15s;
}
.card:hover { border-color: var(--border2); background: var(--bg3); }
.card.active-session { border-color: var(--gold); background: var(--gold-dim2); }

.card-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.card-meta {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.card-meta .badge {
  background: var(--gold-dim);
  color: var(--gold);
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
}
.card-actions {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
}

/* ── COMPOSE TAB ── */
#tab-compose {
  flex-direction: column;
  overflow: hidden;
}

.compose-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}

.compose-list {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.compose-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  border: 1px solid transparent;
  transition: all 0.1s;
}
.compose-row:hover { background: var(--bg3); border-color: var(--border); }

.compose-tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 2px 6px;
  border-radius: 3px;
  flex-shrink: 0;
}
.compose-tag.a { background: var(--gold-dim); color: var(--gold); }
.compose-tag.b { background: rgba(96,122,201,0.15); color: #8fa3e0; }
.compose-tag.idx { color: var(--text3); font-family: 'DM Mono', monospace; font-size: 10px; }

.compose-text {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text);
  flex: 1;
}

/* ── COMPOSITION EDITOR ── */
.comp-editor {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.comp-editor-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}
.comp-title-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  outline: none;
}
.comp-title-input::placeholder { color: var(--text3); font-weight: 400; }
.comp-textarea {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'JetBrains Mono', 'DM Mono', monospace;
  font-size: 13px;
  line-height: 1.8;
  outline: none;
  resize: none;
  padding: 20px;
  letter-spacing: 0.01em;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
  font-size: 13px;
}
.empty-state .icon { font-size: 36px; margin-bottom: 12px; }
.empty-state p { margin-top: 6px; line-height: 1.6; max-width: 300px; margin-inline: auto; }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 28px;
  min-width: 320px;
  max-width: 420px;
  width: 90%;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.modal h3 { font-size: 16px; font-weight: 700; color: var(--gold2); }
.modal p { font-size: 13px; color: var(--text2); line-height: 1.5; }
.modal-input {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  width: 100%;
  transition: border-color 0.15s;
}
.modal-input:focus { border-color: var(--gold); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ── MOBILE ── */
@media (max-width: 680px) {
  #tab-editor { flex-direction: column; }
  .panel { border-right: none; border-bottom: 1px solid var(--border); }
  .panel:last-child { border-bottom: none; }
  .tab-btn { padding: 10px 12px; font-size: 11px; }
}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">Lyric<span>Composer</span></div>
    <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);font-weight:400;letter-spacing:0.5px;">v1.1</span>
    <div class="session-label" id="session-label">nessuna sessione</div>
    <div class="spacer"></div>
    <div class="sync-dot" id="sync-dot" title="Sync status"></div>
    <button class="theme-toggle" id="btn-theme" title="Cambia tema">☀️ Chiaro</button>
    <button class="btn primary" id="btn-save-session">💾 Sessione</button>
  </header>

  <!-- TABS -->
  <div class="tabs-bar">
    <button class="tab-btn active" data-tab="editor">Editor</button>
    <button class="tab-btn" data-tab="sessions">Sessioni</button>
    <button class="tab-btn" data-tab="compose">Componi</button>
    <button class="tab-btn" data-tab="library">Libreria</button>
    <button class="tab-btn" data-tab="compositions">Composizioni</button>
  </div>

  <!-- TAB: EDITOR -->
  <div class="tab-content active" id="tab-editor">
    <!-- PANEL A -->
    <div class="panel" id="panel-a">
      <div class="panel-header">
        <span class="panel-label">A</span>
        <input class="title-input" id="title-a" placeholder="Titolo canzone A…">
        <button class="btn icon small" id="save-a" title="Salva canzone A">💾</button>
      </div>
      <div class="panel-body">
        <div class="line-numbers" id="ln-a"><div class="line-numbers-inner" id="ln-a-inner"></div></div>
        <div class="marks-col" id="marks-a"><div class="marks-col-inner" id="marks-a-inner"></div></div>
        <div class="textarea-wrap" id="wrap-a">
          <textarea class="editor-textarea" id="text-a" placeholder="Testo canzone A…" spellcheck="false"></textarea>
        </div>
      </div>
      <div class="panel-footer">
        <span>Righe: <span class="stat" id="stat-a-lines">0</span></span>
        <span>Parole: <span class="stat" id="stat-a-words">0</span></span>
        <span>✓ <span class="stat" id="stat-a-marks">0</span></span>
      </div>
    </div>
    <!-- PANEL B -->
    <div class="panel" id="panel-b">
      <div class="panel-header">
        <span class="panel-label b">B</span>
        <input class="title-input" id="title-b" placeholder="Titolo canzone B…">
        <button class="btn icon small" id="save-b" title="Salva canzone B">💾</button>
      </div>
      <div class="panel-body">
        <div class="line-numbers" id="ln-b"><div class="line-numbers-inner" id="ln-b-inner"></div></div>
        <div class="marks-col" id="marks-b"><div class="marks-col-inner" id="marks-b-inner"></div></div>
        <div class="textarea-wrap" id="wrap-b">
          <textarea class="editor-textarea" id="text-b" placeholder="Testo canzone B…" spellcheck="false"></textarea>
        </div>
      </div>
      <div class="panel-footer">
        <span>Righe: <span class="stat" id="stat-b-lines">0</span></span>
        <span>Parole: <span class="stat" id="stat-b-words">0</span></span>
        <span>✓ <span class="stat" id="stat-b-marks">0</span></span>
      </div>
    </div>
  </div>

  <!-- TAB: SESSIONS -->
  <div class="tab-content" id="tab-sessions">
    <div class="list-header">
      <span style="font-weight:700;font-size:13px;">Sessioni salvate</span>
      <div class="spacer"></div>
      <button class="btn" id="btn-new-session">+ Nuova sessione</button>
    </div>
    <div class="list-view" id="sessions-list"></div>
  </div>

  <!-- TAB: COMPOSE -->
  <div class="tab-content" id="tab-compose">
    <div class="compose-toolbar">
      <span style="font-weight:700;font-size:13px;color:var(--text2);">Righe selezionate</span>
      <div class="spacer"></div>
      <button class="btn small" id="btn-copy-compose">📋 Copia</button>
      <button class="btn small primary" id="btn-save-composition">💾 Salva composizione</button>
    </div>
    <div class="compose-list" id="compose-list"></div>
  </div>

  <!-- TAB: LIBRARY -->
  <div class="tab-content" id="tab-library">
    <div class="list-header">
      <input class="search-input" id="library-search" placeholder="Cerca per titolo o testo…">
    </div>
    <div class="list-view" id="library-list"></div>
  </div>

  <!-- TAB: COMPOSITIONS -->
  <div class="tab-content" id="tab-compositions">
    <div class="list-header" id="comp-list-header">
      <span style="font-weight:700;font-size:13px;">Composizioni</span>
    </div>
    <div class="list-view" id="compositions-list"></div>
    <!-- inline editor -->
    <div class="comp-editor" id="comp-editor" style="display:none;">
      <div class="comp-editor-header">
        <button class="btn small" id="btn-comp-back">← Lista</button>
        <input class="comp-title-input" id="comp-title" placeholder="Titolo composizione…">
        <button class="btn small primary" id="btn-comp-save">💾 Salva</button>
        <button class="btn small" id="btn-comp-copy">📋 Copia</button>
        <button class="btn small danger" id="btn-comp-delete">🗑</button>
      </div>
      <textarea class="comp-textarea" id="comp-textarea" spellcheck="false"></textarea>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Nome</h3>
    <p id="modal-desc"></p>
    <input class="modal-input" id="modal-input" placeholder="">
    <div class="modal-actions">
      <button class="btn" id="modal-cancel">Annulla</button>
      <button class="btn primary" id="modal-confirm">Conferma</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirm-overlay">
  <div class="modal">
    <h3 id="confirm-title">Conferma</h3>
    <p id="confirm-desc"></p>
    <div class="modal-actions">
      <button class="btn" id="confirm-cancel">Annulla</button>
      <button class="btn danger" id="confirm-ok">Elimina</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  SUPABASE

function lsLoad() {
  try { songs        = JSON.parse(localStorage.getItem('lc_songs')   || '{}'); } catch { songs = {}; }
  try { sessions     = JSON.parse(localStorage.getItem('lc_sessions') || '{}'); } catch { sessions = {}; }
  try { compositions = JSON.parse(localStorage.getItem('lc_comps')   || '{}'); } catch { compositions = {}; }
}
function lsSave() {
  localStorage.setItem('lc_songs',    JSON.stringify(songs));
  localStorage.setItem('lc_sessions', JSON.stringify(sessions));
  localStorage.setItem('lc_comps',    JSON.stringify(compositions));
}

// ══════════════════════════════════════════
//  SUPABASE SYNC
// ══════════════════════════════════════════
async function syncPull() {
  setSyncStatus('syncing');
  try {
    const [{ data: s }, { data: se }, { data: c }] = await Promise.all([
      supa.from('songs').select('*'),
      supa.from('sessions').select('*'),
      supa.from('compositions').select('*'),
    ]);
    (s || []).forEach(r => { if (!songs[r.id] || songs[r.id].ts < r.ts) songs[r.id] = r; });
    (se || []).forEach(r => { if (!sessions[r.id] || sessions[r.id].ts < r.ts) sessions[r.id] = r; });
    (c || []).forEach(r => { if (!compositions[r.id] || compositions[r.id].ts < r.ts) compositions[r.id] = r; });
    lsSave();
    setSyncStatus('ok');
    setTimeout(() => setSyncStatus(''), 2000);
  } catch(e) {
    console.warn('Sync pull error', e);
    setSyncStatus('err');
    setTimeout(() => setSyncStatus(''), 3000);
  }
}

async function pushSong(song) {
  try { await supa.from('songs').upsert(song); } catch(e) { console.warn(e); }
}
async function pushSession(sess) {
  try { await supa.from('sessions').upsert(sess); } catch(e) { console.warn(e); }
}
async function pushComposition(comp) {
  try { await supa.from('compositions').upsert(comp); } catch(e) { console.warn(e); }
}
async function deleteSong(id) {
  try { await supa.from('songs').delete().eq('id', id); } catch(e) { console.warn(e); }
}
async function deleteSession(id) {
  try { await supa.from('sessions').delete().eq('id', id); } catch(e) { console.warn(e); }
}
async function deleteComposition(id) {
  try { await supa.from('compositions').delete().eq('id', id); } catch(e) { console.warn(e); }
}

// ══════════════════════════════════════════
//  EDITOR — LINE NUMBERS & MARKS
// ══════════════════════════════════════════
function getLines(which) {
  return $(which === 'a' ? 'text-a' : 'text-b').value.split('\n');
}

function renderLineUI(which) {
  const lines = getLines(which);
  const marks = which === 'a' ? editorState.marksA : editorState.marksB;
  const lnInner = $('ln-' + which + '-inner');
  const mkInner = $('marks-' + which + '-inner');

  // Ensure marks array length matches lines
  while (marks.length < lines.length) marks.push(0);
  if (marks.length > lines.length) marks.length = lines.length;

  const LH = 13 * 1.7; // px per line — must match .editor-textarea font-size * line-height
  lnInner.innerHTML = lines.map((_,i) =>
    `<div style="height:${LH}px;line-height:${LH}px;text-align:right;padding-right:6px;">${i+1}</div>`
  ).join('');

  mkInner.innerHTML = '';
  lines.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'mark-btn' + (marks[i] === 1 ? ' include' : marks[i] === -1 ? ' exclude' : '');
    btn.textContent = marks[i] === 1 ? '✓' : marks[i] === -1 ? '✕' : '·';
    btn.style.height = LH + 'px';
    btn.title = 'Cicla stato riga ' + (i+1);
    btn.addEventListener('click', () => cycleMarkBtn(which, i));
    mkInner.appendChild(btn);
  });

  updateStats(which);
}

function cycleMarkBtn(which, idx) {
  const marks = which === 'a' ? editorState.marksA : editorState.marksB;
  marks[idx] = marks[idx] === 0 ? 1 : marks[idx] === 1 ? -1 : 0;
  renderLineUI(which);
  debouncedAutoSave();
}

function updateStats(which) {
  const text  = $(which === 'a' ? 'text-a' : 'text-b').value;
  const marks = which === 'a' ? editorState.marksA : editorState.marksB;
  const lines = text ? text.split('\n') : [];
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const marked = marks.filter(m => m === 1).length;
  $(`stat-${which}-lines`).textContent = lines.length || 0;
  $(`stat-${which}-words`).textContent = words;
  $(`stat-${which}-marks`).textContent = marked;
}

let syncingScroll = false;

function syncSideColumns(which, scrollTop) {
  $('ln-' + which + '-inner').style.transform = `translateY(-${scrollTop}px)`;
  $('marks-' + which + '-inner').style.transform = `translateY(-${scrollTop}px)`;
}

function setupScrollSync() {
  const tA = $('text-a'), tB = $('text-b');

  tA.addEventListener('scroll', () => {
    syncSideColumns('a', tA.scrollTop);
    if (syncingScroll) return;
    syncingScroll = true;
    tB.scrollTop = tA.scrollTop;
    syncSideColumns('b', tA.scrollTop);
    syncingScroll = false;
  });

  tB.addEventListener('scroll', () => {
    syncSideColumns('b', tB.scrollTop);
    if (syncingScroll) return;
    syncingScroll = true;
    tA.scrollTop = tB.scrollTop;
    syncSideColumns('a', tB.scrollTop);
    syncingScroll = false;
  });
}

// ══════════════════════════════════════════
let autoSaveTimer = null;
function debouncedAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(autoSave, 1500);
}

function autoSave() {
  const tA = $('title-a').value.trim(), txA = $('text-a').value.trim();
  const tB = $('title-b').value.trim(), txB = $('text-b').value.trim();
  if (tA && txA) saveSong('a', false);
  if (tB && txB) saveSong('b', false);
}

// ══════════════════════════════════════════
//  SAVE SONG
// ══════════════════════════════════════════
function saveSong(which, notify = true) {
  const titleEl = $(which === 'a' ? 'title-a' : 'title-b');
  const textEl  = $(which === 'a' ? 'text-a'  : 'text-b');
  const marks   = which === 'a' ? editorState.marksA : editorState.marksB;
  const title = titleEl.value.trim();
  const text  = textEl.value.trim();
  if (!title || !text) { if (notify) alert('Titolo e testo richiesti'); return null; }

  const existingId = which === 'a' ? editorState.songIdA : editorState.songIdB;
  const id = existingId || uid();
  const song = { id, title, text, marks: [...marks], ts: now() };
  songs[id] = song;
  if (which === 'a') editorState.songIdA = id;
  else editorState.songIdB = id;
  lsSave();
  setSyncStatus('syncing');
  pushSong(song).then(() => { setSyncStatus('ok'); setTimeout(() => setSyncStatus(''), 2000); });
  if (notify) flashBtn(which === 'a' ? 'save-a' : 'save-b');
  return id;
}

function flashBtn(id) {
  const btn = $(id);
  btn.style.color = 'var(--green)';
  setTimeout(() => btn.style.color = '', 800);
}

$('save-a').addEventListener('click', () => saveSong('a', true));
$('save-b').addEventListener('click', () => saveSong('b', true));

$('btn-save-session').addEventListener('click', () => {
  if (sessionId) {
    doSaveSession(sessionId, sessionName);
  } else {
    openModal('Nome sessione', 'Inserisci un nome per questa sessione:', '', name => {
      if (!name) return;
      const id = uid();
      sessionId = id;
      sessionName = name;
      doSaveSession(id, name);
    });
  }
});

function doSaveSession(id, name) {
  // Also save songs
  const idA = saveSong('a', false) || editorState.songIdA;
  const idB = saveSong('b', false) || editorState.songIdB;

  const sess = {
    id, name,
    song_a: idA, song_b: idB,
    title_a: $('title-a').value.trim(),
    title_b: $('title-b').value.trim(),
    text_a:  $('text-a').value,
    text_b:  $('text-b').value,
    marks_a: [...editorState.marksA],
    marks_b: [...editorState.marksB],
    ts: now(),
  };
  sessions[id] = sess;
  lsSave();
  updateSessionLabel();
  setSyncStatus('syncing');
  pushSession(sess).then(() => { setSyncStatus('ok'); setTimeout(() => setSyncStatus(''), 2000); });
  flashBtn('btn-save-session');
}

$('btn-new-session').addEventListener('click', () => {
  sessionId = null; sessionName = null;
  updateSessionLabel();
  openModal('Nuova sessione', 'Inserisci un nome per la nuova sessione:', '', name => {
    if (!name) return;
    const id = uid();
    sessionId = id;
    sessionName = name;
    doSaveSession(id, name);
    renderSessions();
  });
});

function updateSessionLabel() {
  const el = $('session-label');
  if (sessionId && sessionName) {
    el.textContent = sessionName;
    el.className = 'session-label active';
  } else {
    el.textContent = 'nessuna sessione';
    el.className = 'session-label';
  }
}

function loadSession(sess) {
  sessionId = sess.id;
  sessionName = sess.name;
  editorState.songIdA = sess.song_a || null;
  editorState.songIdB = sess.song_b || null;
  $('title-a').value = sess.title_a || '';
  $('title-b').value = sess.title_b || '';
  $('text-a').value  = sess.text_a || '';
  $('text-b').value  = sess.text_b || '';
  editorState.marksA = Array.isArray(sess.marks_a) ? [...sess.marks_a] : [];
  editorState.marksB = Array.isArray(sess.marks_b) ? [...sess.marks_b] : [];
  renderLineUI('a');
  renderLineUI('b');
  updateSessionLabel();
  // Switch to editor
  document.querySelector('[data-tab="editor"]').click();
}

function renderSessions() {
  const el = $('sessions-list');
  const list = Object.values(sessions).sort((a,b) => b.ts - a.ts);
  if (!list.length) { el.innerHTML = '<div class="empty-state"><div class="icon">🎵</div><p>Nessuna sessione salvata. Crea la tua prima sessione dall\'editor.</p></div>'; return; }
  el.innerHTML = '';
  list.forEach(sess => {
    const card = document.createElement('div');
    card.className = 'card' + (sess.id === sessionId ? ' active-session' : '');
    const d = new Date(sess.ts);
    card.innerHTML = `
      <div class="card-title">${esc(sess.name)}</div>
      <div class="card-meta">
        <span>${d.toLocaleDateString('it-IT')} ${d.toLocaleTimeString('it-IT', {hour:'2-digit',minute:'2-digit'})}</span>
        ${sess.title_a ? `<span class="badge">A: ${esc(sess.title_a)}</span>` : ''}
        ${sess.title_b ? `<span class="badge">B: ${esc(sess.title_b)}</span>` : ''}
      </div>
      <div class="card-actions">
        <button class="btn small" data-load="${sess.id}">📂 Carica</button>
        <button class="btn small danger" data-del-sess="${sess.id}">🗑 Elimina</button>
      </div>`;
    el.appendChild(card);
  });
  el.querySelectorAll('[data-load]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); loadSession(sessions[btn.dataset.load]); });
  });
  el.querySelectorAll('[data-del-sess]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); confirmDelete('Elimina sessione', 'Sicuro di voler eliminare questa sessione?', () => {
      const id = btn.dataset.delSess;
      delete sessions[id];
      lsSave();
      deleteSession(id);
      if (sessionId === id) { sessionId = null; sessionName = null; updateSessionLabel(); }
      renderSessions();
    }); });
  });
}

// ══════════════════════════════════════════
//  COMPOSE
// ══════════════════════════════════════════
function renderCompose() {
  const el = $('compose-list');
  const linesA = $('text-a').value ? $('text-a').value.split('\n') : [];
  const linesB = $('text-b').value ? $('text-b').value.split('\n') : [];
  const marksA = editorState.marksA;
  const marksB = editorState.marksB;

  const rows = [];
  const maxLen = Math.max(linesA.length, linesB.length);
  for (let i = 0; i < maxLen; i++) {
    if (marksA[i] === 1) rows.push({ idx: i, which: 'a', text: linesA[i] });
    if (marksB[i] === 1) rows.push({ idx: i, which: 'b', text: linesB[i] });
  }
  rows.sort((a,b) => a.idx - b.idx || (a.which === 'a' ? -1 : 1));

  if (!rows.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">✍️</div><p>Segna alcune righe con ✓ nell\'editor per vederle qui.</p></div>';
    return;
  }
  el.innerHTML = '';
  rows.forEach(r => {
    const row = document.createElement('div');
    row.className = 'compose-row';
    row.innerHTML = `<span class="compose-tag ${r.which}">${r.which.toUpperCase()}</span><span class="compose-tag idx">${r.idx+1}</span><span class="compose-text">${esc(r.text)}</span>`;
    el.appendChild(row);
  });
}

function getComposedText() {
  const linesA = $('text-a').value ? $('text-a').value.split('\n') : [];
  const linesB = $('text-b').value ? $('text-b').value.split('\n') : [];
  const marksA = editorState.marksA;
  const marksB = editorState.marksB;
  const rows = [];
  const maxLen = Math.max(linesA.length, linesB.length);
  for (let i = 0; i < maxLen; i++) {
    if (marksA[i] === 1) rows.push({ idx: i, which: 'a', text: linesA[i] });
    if (marksB[i] === 1) rows.push({ idx: i, which: 'b', text: linesB[i] });
  }
  rows.sort((a,b) => a.idx - b.idx || (a.which === 'a' ? -1 : 1));
  return rows.map(r => r.text).join('\n');
}

$('btn-copy-compose').addEventListener('click', () => {
  const text = getComposedText();
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => flashBtn('btn-copy-compose'));
});

$('btn-save-composition').addEventListener('click', () => {
  const text = getComposedText();
  if (!text) { alert('Nessuna riga selezionata'); return; }
  openModal('Salva composizione', 'Inserisci un titolo:', '', title => {
    if (!title) return;
    const comp = { id: uid(), title, text, ts: now() };
    compositions[comp.id] = comp;
    lsSave();
    pushComposition(comp);
    alert('Composizione salvata!');
  });
});

let libraryQuery = '';
$('library-search').addEventListener('input', e => { libraryQuery = e.target.value.toLowerCase(); renderLibrary(); });

function renderLibrary() {
  const el = $('library-list');
  let list = Object.values(songs).sort((a,b) => b.ts - a.ts);
  if (libraryQuery) list = list.filter(s => s.title.toLowerCase().includes(libraryQuery) || s.text.toLowerCase().includes(libraryQuery));
  if (!list.length) { el.innerHTML = '<div class="empty-state"><div class="icon">📚</div><p>Nessuna canzone in libreria. Salva una canzone dall\'editor.</p></div>'; return; }
  el.innerHTML = '';
  list.forEach(song => {
    const marks = Array.isArray(song.marks) ? song.marks : [];
    const lines = song.text ? song.text.split('\n').length : 0;
    const marked = marks.filter(m => m === 1).length;
    const d = new Date(song.ts);
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-title">${esc(song.title)}</div>
      <div class="card-meta">
        <span>${d.toLocaleDateString('it-IT')}</span>
        <span>${lines} righe</span>
        ${marked ? `<span class="badge">✓ ${marked}</span>` : ''}
      </div>
      <div class="card-actions">
        <button class="btn small" data-load-a="${song.id}">→ A</button>
        <button class="btn small" data-load-b="${song.id}">→ B</button>
        <button class="btn small danger" data-del-song="${song.id}">🗑</button>
      </div>`;
    el.appendChild(card);
  });
  el.querySelectorAll('[data-load-a]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); loadSongIntoPanel(btn.dataset.loadA, 'a'); });
  });
  el.querySelectorAll('[data-load-b]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); loadSongIntoPanel(btn.dataset.loadB, 'b'); });
  });
  el.querySelectorAll('[data-del-song]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); confirmDelete('Elimina canzone', 'Sicuro di voler eliminare questa canzone?', () => {
      delete songs[btn.dataset.delSong];
      lsSave();
      deleteSong(btn.dataset.delSong);
      renderLibrary();
    }); });
  });
}

function loadSongIntoPanel(songId, which) {
  const song = songs[songId];
  if (!song) return;
  if (which === 'a') {
    $('title-a').value = song.title;
    $('text-a').value  = song.text;
    editorState.songIdA = song.id;
    editorState.marksA  = Array.isArray(song.marks) ? [...song.marks] : [];
    renderLineUI('a');
  } else {
    $('title-b').value = song.title;
    $('text-b').value  = song.text;
    editorState.songIdB = song.id;
    editorState.marksB  = Array.isArray(song.marks) ? [...song.marks] : [];
    renderLineUI('b');
  }
  document.querySelector('[data-tab="editor"]').click();
}

  if (!editingCompId) return;
  const comp = compositions[editingCompId];
  comp.title = $('comp-title').value.trim() || comp.title;
  comp.text  = $('comp-textarea').value;
  comp.ts    = now();
  lsSave();
  pushComposition(comp);
  flashBtn('btn-comp-save');
});
$('btn-comp-copy').addEventListener('click', () => {
  navigator.clipboard.writeText($('comp-textarea').value);
  flashBtn('btn-comp-copy');
});
$('btn-comp-delete').addEventListener('click', () => {
  if (!editingCompId) return;
  confirmDelete('Elimina composizione', 'Sicuro di voler eliminare questa composizione?', () => {
    delete compositions[editingCompId];
    lsSave();
    deleteComposition(editingCompId);
    showCompList();
    renderCompositions();
  });
});

// ══════════════════════════════════════════
//  MODAL helpers
// ══════════════════════════════════════════
let modalCallback = null;
function openModal(title, desc, placeholder, cb) {
  $('modal-title').textContent = title;
  $('modal-desc').textContent  = desc;
  $('modal-input').value = '';
  $('modal-input').placeholder = placeholder;
  modalCallback = cb;
  $('modal-overlay').classList.add('open');
  setTimeout(() => $('modal-input').focus(), 50);
}
$('modal-cancel').addEventListener('click', () => $('modal-overlay').classList.remove('open'));
$('modal-confirm').addEventListener('click', () => {
  const val = $('modal-input').value.trim();
  $('modal-overlay').classList.remove('open');
  if (modalCallback) modalCallback(val);
});
$('modal-input').addEventListener('keydown', e => { if (e.key === 'Enter') $('modal-confirm').click(); });

let confirmCallback = null;
function confirmDelete(title, desc, cb) {
  $('confirm-title').textContent = title;
  $('confirm-desc').textContent  = desc;
  confirmCallback = cb;
  $('confirm-overlay').classList.add('open');
}
$('confirm-cancel').addEventListener('click', () => $('confirm-overlay').classList.remove('open'));
$('confirm-ok').addEventListener('click', () => {
  $('confirm-overlay').classList.remove('open');
  if (confirmCallback) confirmCallback();
});

// ══════════════════════════════════════════
//  ESCAPE HTML
// ══════════════════════════════════════════
function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════
//  THEME TOGGLE
// ══════════════════════════════════════════
(function() {
  const btn = $('btn-theme');
  const saved = localStorage.getItem('lc_theme') || 'dark';
  if (saved === 'light') { document.documentElement.setAttribute('data-theme','light'); btn.textContent = '🌙 Scuro'; }
  btn.addEventListener('click', () => {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    if (isLight) {
      document.documentElement.removeAttribute('data-theme');
      btn.textContent = '☀️ Chiaro';
      localStorage.setItem('lc_theme','dark');
    } else {
      document.documentElement.setAttribute('data-theme','light');
      btn.textContent = '🌙 Scuro';
      localStorage.setItem('lc_theme','light');
    }
  });
})();

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
async function init() {
  lsLoad();
  renderLineUI('a');
  renderLineUI('b');
  setupScrollSync();
  renderSessions();
  renderLibrary();
  renderCompositions();
  await syncPull();
  renderSessions();
  renderLibrary();
  renderCompositions();
}

init();
</script>
